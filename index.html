<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>午夜委託 - 沉浸式通訊解謎</title>
  <meta name="description" content="午夜委託：沉浸式防詐騙互動故事遊戲。體驗真實詐騙情境，測試你的防詐意識。">
  <meta property="og:title" content="午夜委託 - 沉浸式通訊解謎">
  <meta property="og:description" content="你能識破詐騙集團的陷阱嗎？體驗真實的詐騙情境，學會保護自己。">

  <meta name="twitter:card" content="summary">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #000;
      color: #fff;
      overflow: hidden;
      user-select: none;
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
      /* 移除點擊預設藍框 */
    }

    button:focus {
      outline: none;
      /* 讓按鈕 focus 不會有外框 */
      box-shadow: none !important;
    }

    /* ---------------- 動畫庫 ---------------- */
    @keyframes slow-pan {
      0% {
        transform: scale(1) translate(0, 0);
      }

      50% {
        transform: scale(1.05) translate(-1%, -1%);
      }

      100% {
        transform: scale(1) translate(0, 0);
      }
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-3px);
      }

      75% {
        transform: translateX(3px);
      }
    }

    /* 訊息彈出效果 (帶有物理回彈感) */
    @keyframes message-pop {
      0% {
        opacity: 0;
        transform: translateY(15px) scale(0.95);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* 推播通知下拉效果 */
    @keyframes notify-drop {
      0% {
        transform: translateY(-150%);
        opacity: 0;
      }

      10% {
        transform: translateY(0);
        opacity: 1;
      }

      90% {
        transform: translateY(0);
        opacity: 1;
      }

      100% {
        transform: translateY(-150%);
        opacity: 0;
      }
    }

    /* 打字點點動畫 */
    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: translateY(0);
      }

      40% {
        transform: translateY(-4px);
      }
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-slow-pan {
      animation: slow-pan 25s ease-in-out infinite alternate;
    }

    .animate-shake {
      animation: shake 0.2s ease-in-out 2;
    }

    .msg-pop {
      animation: message-pop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .notify-anim {
      animation: notify-drop 4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .typing-dot {
      width: 5px;
      height: 5px;
      background-color: #9ca3af;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    .animate-fade-in {
      animation: fade-in 0.35s ease-out both;
    }

    .pb-safe {
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }

    /* 隱藏原生捲軸，但保留捲動功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scanlines {
      background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNCIgaGVpZ2h0PSI0IiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wMykiLz48L3N2Zz4=');
    }

    /* 手機聽筒瀏海設計 */
    .iphone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 25px;
      background-color: #000;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
      z-index: 100;
    }

    /* 來電光環動畫 */
    @keyframes ring-expand {
      0% {
        transform: scale(1);
        opacity: 0.5;
      }

      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    .call-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      animation: ring-expand 2s ease-out infinite;
    }

    .call-ring:nth-child(2) {
      animation-delay: 0.65s;
    }

    .call-ring:nth-child(3) {
      animation-delay: 1.3s;
    }

    .call-slider {
      position: relative;
      width: 100%;
      height: 68px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
      touch-action: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .call-slider-fill {
      position: absolute;
      top: 4px;
      left: 4px;
      bottom: 4px;
      width: 60px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.75), rgba(22, 163, 74, 0.9));
      transition: width 0.22s ease;
      box-shadow: 0 0 24px rgba(34, 197, 94, 0.28);
    }

    .call-slider-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 60px;
      height: 60px;
      border-radius: 999px;
      border: 0;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.35);
      cursor: grab;
      touch-action: none;
      transition: transform 0.22s ease;
    }

    .call-slider-thumb:active {
      cursor: grabbing;
    }

    .call-slider-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
      font-size: 11px;
      font-weight: 700;
      transition: opacity 0.18s ease;
    }
  </style>
</head>

  <script>
    // --- 劇情與結局資料集 ---
    const SCENE_IMAGES = {
      STREET_NIGHT: 'https://images.unsplash.com/photo-1517568560156-fbd9c424df39?auto=format&fit=crop&q=80&w=1920',
      ALLEY: 'https://images.unsplash.com/photo-1580974582391-a6649c82a85f?auto=format&fit=crop&q=80&w=1920',
      PHONE_SCREEN: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&q=80&w=1920',
      ATM: 'https://images.unsplash.com/photo-1559103009-8d184ebf32b7?auto=format&fit=crop&q=80&w=1920'
    };

    const STORY = {
      START: {
        bg: SCENE_IMAGES.STREET_NIGHT, speaker: '系統',
        text: '你正打算回家，手機卻狂震起來。是死黨阿杰的來電。', // This text will be dynamically set by startGame
        options: []
      },
      S0_IGNORE: {
        bg: SCENE_IMAGES.STREET_NIGHT, speaker: '系統', effect: 'shake',
        text: '你按下了拒接。才走沒兩步，手機又狂震起來，這傢伙不接電話不會罷休的。',
        options: []
      },
      S1: {
        bg: SCENE_IMAGES.STREET_NIGHT, speaker: '阿杰 (語音)',
        text: '兄弟！救命啊！你現在有空嗎？拜託拜託，超級緊急的！',
        options: [
          { text: '怎麼了？你聲音怎麼這麼慌？', next: 'S1B' },
          { text: '又出什麼事了？', next: 'S1B' }
        ]
      },
      S1B: {
        bg: SCENE_IMAGES.STREET_NIGHT, speaker: '阿杰 (語音)',
        text: '我那個練了兩年的遊戲帳號終於賣掉了！三萬塊！但買家說他只做現金面交，而且堅持要在今晚十一點前拿到帳號驗證碼，不然就取消交易。',
        options: [
          { text: '三萬？哪個遊戲帳號值這麼多？', next: 'S1C' },
          { text: '那你自己去拿錢啊？', next: 'S1C' }
        ]
      },
      S1C: {
        bg: SCENE_IMAGES.STREET_NIGHT, speaker: '阿杰 (語音)',
        text: '我段考作弊被我媽抓到，她把門反鎖，我現在根本出不去！我通訊錄打了一輪，其他人不是關機就是已讀不回，只剩你了。拜託，中山站二號出口附近，幫我跑一趟就好！',
        options: [
          { text: '路邊面交拿三萬現金？聽起來超怪...', next: 'S2_DOUBT' },
          { text: '幫你可以，跑腿費兩千塊從裡面扣。', next: 'S2_GREED' },
          { text: '我明天還要模考，很累想回家了。', next: 'S2_REFUSE' },
          { text: '好啦好啦，把地址傳給我。', next: 'S2_HELP' }
        ]
      },

    // QTE 計時器
    function startTimer(duration, timeoutNext) {
      const bar = document.getElementById('timer-bar-fill');
      const container = document.getElementById('timer-container');
      const alertBox = document.getElementById('qte-alert');

      container.classList.remove('hidden');
      alertBox.classList.remove('hidden');
      alertBox.classList.add('flex');

      qteTimeoutNext = timeoutNext;
      let start = Date.now();
      let end = start + duration * 1000;

      function tick() {
        let now = Date.now();
        let remaining = Math.max(0, end - now);
        let percentage = (remaining / (duration * 1000)) * 100;
        bar.style.width = percentage + '%';

        if (remaining > 0) {
          qteAnimationId = requestAnimationFrame(tick);
        } else {
          stopTimer();
          handleOptionSelect(qteTimeoutNext, null);
        }
      }
      qteAnimationId = requestAnimationFrame(tick);
    }

    function stopTimer() {
      cancelAnimationFrame(qteAnimationId);
      document.getElementById('timer-container').classList.add('hidden');
      document.getElementById('qte-alert').classList.add('hidden');
      document.getElementById('qte-alert').classList.remove('flex');
    }

    // 渲染主循環
    async function renderNode(nodeId) {
      currentNodeId = nodeId;
      const node = STORY[nodeId];

      if (!node && ENDINGS[nodeId]) {
        renderEnding(nodeId);
        return;
      }

      // 更新背景與震動（只在圖片真的不同時才更新，避免無謂重繪）
      const bgEl = document.getElementById('scene-bg');
      const newBg = `url('${node.bg}')`;
      if (bgEl.style.backgroundImage !== newBg) {
        bgEl.style.backgroundImage = newBg;
      }
      if (node.effect === 'shake') {
        document.getElementById('phone-frame').classList.remove('animate-shake');
        void document.getElementById('phone-frame').offsetWidth; // restart anim
        document.getElementById('phone-frame').classList.add('animate-shake');
      }

      updateChatHeader(node.speaker);

      // 推進時間 (每句對話過 0~2 分鐘)
      currentMinutesOffset += Math.floor(Math.random() * 3);

      // 打字與顯示
      await showTypingIndicator(node.speaker);
      appendBubble(node.speaker, node.text, 'incoming');

      // 準備選項面板
      const optionsArea = document.getElementById('options-area');
      const optionsContainer = document.getElementById('options-container');
      optionsContainer.innerHTML = '';

      if (node.options) {
        // 保持原始選項順序，確保敘事邏輯連貫
        node.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = "w-full bg-[#27272a] hover:bg-[#3f3f46] text-white border border-white/5 p-3.5 rounded-xl text-[14.5px] font-medium tracking-wide transition-colors text-center active:scale-[0.98] shadow-sm select-none";
          btn.innerText = opt.text;
          btn.onclick = () => handleOptionSelect(opt.next, opt.text);
          optionsContainer.appendChild(btn);
        });
      }

      // 滑出選項面板並確保捲動到底部
      optionsArea.classList.remove('translate-y-full');
      scrollToBottom();

      if (node.timeLimit) {
        startTimer(node.timeLimit, node.timeoutNext);
      }
      isTransitioning = false;
    }

    function handleOptionSelect(nextId, optionText) {
      if (isTransitioning) return;
      isTransitioning = true;
      stopTimer();

      playerPath.push(nextId); // 記錄路徑

      const optionsArea = document.getElementById('options-area');
      optionsArea.classList.add('translate-y-full');

      if (optionText) {
        appendBubble('我', optionText, 'outgoing');
      }

      setTimeout(() => { renderNode(nextId); }, 1800);
    }

    function getCallSliderMetrics() {
      const slider = document.getElementById('answer-slider');
      const thumb = document.getElementById('answer-slider-thumb');
      const fill = document.getElementById('answer-slider-fill');
      const label = document.getElementById('answer-slider-label');
      const maxX = Math.max(0, slider.clientWidth - thumb.offsetWidth - 8);
      return { slider, thumb, fill, label, maxX };
    }

    function updateCallSlider(positionX, animate = false) {
      const { thumb, fill, label, maxX } = getCallSliderMetrics();
      const clamped = Math.max(0, Math.min(positionX, maxX));
      const progress = maxX === 0 ? 0 : clamped / maxX;

      thumb.style.transition = animate ? 'transform 0.22s ease' : 'none';
      fill.style.transition = animate ? 'width 0.22s ease' : 'none';
      label.style.transition = animate ? 'opacity 0.18s ease' : 'none';

      thumb.style.transform = `translateX(${clamped}px)`;
      fill.style.width = `${clamped + thumb.offsetWidth}px`;
      label.style.opacity = `${Math.max(0.12, 1 - progress * 0.92)}`;

      callSliderState.currentX = clamped;
    }

    function resetCallSlider(animate = false) {
      callSliderState.dragging = false;
      callSliderState.pointerId = null;
      callSliderState.startX = 0;
      callSliderState.startOffset = 0;
      callSliderState.currentX = 0;
      callSliderState.accepted = false;

      const { slider } = getCallSliderMetrics();
      slider.classList.remove('ring-2', 'ring-green-400/40');
      updateCallSlider(0, animate);
    }

    function completeCallSlider() {
      if (callSliderState.accepted) return;
      callSliderState.accepted = true;
      const { maxX } = getCallSliderMetrics();
      updateCallSlider(maxX, true);
      setTimeout(() => acceptCall(), 140);
    }

    function bindCallSlider() {
      const { slider, thumb } = getCallSliderMetrics();
      if (slider.dataset.bound === 'true') return;
      slider.dataset.bound = 'true';

      const endDrag = event => {
        if (!callSliderState.dragging) return;
        if (event.pointerId !== undefined && callSliderState.pointerId !== null && event.pointerId !== callSliderState.pointerId) return;

        const { maxX } = getCallSliderMetrics();
        callSliderState.dragging = false;
        callSliderState.pointerId = null;
        slider.classList.remove('ring-2', 'ring-green-400/40');

        if (callSliderState.currentX >= maxX * 0.58) {
          completeCallSlider();
        } else {
          resetCallSlider(true);
        }
      };

      thumb.addEventListener('pointerdown', event => {
        if (callSliderState.accepted) return;
        callSliderState.dragging = true;
        callSliderState.pointerId = event.pointerId;
        callSliderState.startX = event.clientX;
        callSliderState.startOffset = callSliderState.currentX;
        thumb.setPointerCapture(event.pointerId);
        slider.classList.add('ring-2', 'ring-green-400/40');
      });

      thumb.addEventListener('pointermove', event => {
        if (!callSliderState.dragging || event.pointerId !== callSliderState.pointerId) return;
        const nextX = callSliderState.startOffset + (event.clientX - callSliderState.startX);
        updateCallSlider(nextX);
      });

      thumb.addEventListener('pointerup', endDrag);
      thumb.addEventListener('pointercancel', endDrag);
      thumb.addEventListener('lostpointercapture', endDrag);
    }

    function enterChatFromCall() {
      setTimeout(() => {
        setView('playing-view');
        prepareChatView();
        appendBubble('系統', introNarration, 'incoming');
        setTimeout(() => renderNode('S1'), 1200);
      }, 320);
    }

    // ===== 來電介面邏輯 =====
    function showIncomingCall(isRetry = false) {
      setView('call-view');

      // 第二次來電換副標文字
      const subtitle = document.getElementById('call-subtitle-text');
      if (subtitle) subtitle.textContent = isRetry ? '奪命連環Call...' : '來電中...';

      resetCallSlider(false);
      lucide.createIcons();

      // Web Vibration API：模擬手機鈴聲震動節奏
      if (navigator.vibrate) {
        const pattern = [700, 300, 700, 300, 700, 1500];
        navigator.vibrate(pattern);
        vibrationInterval = setInterval(() => navigator.vibrate(pattern), 4200);
      }
    }

    function stopRingtone() {
      if (vibrationInterval) { clearInterval(vibrationInterval); vibrationInterval = null; }
      if (navigator.vibrate) navigator.vibrate(0); // 立即停止震動
    }

    function acceptCall() {
      stopRingtone();
      callDeclineCount = 0;
      resetCallSlider(false);
      if (navigator.vibrate) navigator.vibrate(50); // 短促觸覺回饋
      enterChatFromCall();
    }

    function declineCall() {
      stopRingtone();
      resetCallSlider(false);
      const callView = document.getElementById('call-view');
      callView.classList.add('hidden');
      callDeclineCount++;

      if (callDeclineCount === 1) {
        // 第一次拒接：退回鎖定畫面幾秒鐘後再次來電
        document.getElementById('menu-view').classList.remove('opacity-0');
        setView('menu-view');
        setTimeout(() => {
          showIncomingCall(true);
        }, 2200); // 退回首頁 2.2 秒後再次彈出
      } else {
        // 第二次拒接：回到鎖定畫面並結束
        playerPath.push('EARLY_EXIT_IGNORE');
        document.getElementById('menu-view').classList.remove('opacity-0');
        setView('menu-view');

        // 將紀錄直接丟給 Sheets 不顯示結局畫面了，這符合「手機關機忽略」
        if (SHEET_URL && !SHEET_URL.includes('請貼上')) {
          fetch(SHEET_URL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({
              endingId: 'EARLY_EXIT_IGNORE', endingTitle: '結局：與我無關的夜晚', defenseRank: 'S', durationSec: 10, userId: generateUID(), path: playerPath.join(' -> ')
            })
          }).catch(() => { });
        }
      }
    }

    function renderEnding(endingId) {
      const ending = ENDINGS[endingId];
      document.getElementById('ending-title').innerText = ending.title;
      document.getElementById('ending-content').innerText = ending.content;
      document.getElementById('ending-analysis').innerText = ending.analysis;

      const legalContainer = document.getElementById('legal-container');
      legalContainer.classList.add('hidden');
      if (ending.legal) {
        legalContainer.classList.remove('hidden');
        document.getElementById('ending-legal').innerHTML = ending.legal + '<br><br><a href="https://laws010.com/blog/criminal-offense/fraud/fraud-03" target="_blank" class="text-blue-500 underline text-xs">📚 參考資料：車手會被判多重？詐欺法條解析 (法律010)</a>';
      }

      const adviceContainer = document.getElementById('advice-container');
      adviceContainer.classList.add('hidden');
      if (ending.advice) {
        adviceContainer.classList.remove('hidden');
        document.getElementById('ending-advice').innerText = ending.advice;
      }

      const psychContainer = document.getElementById('psych-container');
      psychContainer.classList.add('hidden');
      if (ending.psychTrap) {
        psychContainer.classList.remove('hidden');
        document.getElementById('ending-psych').innerText = ending.psychTrap;
      }

      const caseContainer = document.getElementById('case-container');
      caseContainer.classList.add('hidden');
      if (ending.realCase) {
        caseContainer.classList.remove('hidden');
        document.getElementById('ending-case').innerText = ending.realCase;
      }

      // ✅ 回傳成果資料到 Google Sheets
      if (SHEET_URL && !SHEET_URL.includes('請貼上')) {
        const durationSec = gameStartTime ? Math.round((Date.now() - gameStartTime) / 1000) : 0;
        const rankMatch = ending.analysis.match(/【(?:防禦力\s?)?(.*?)(?:\s?級)?】/);
        const defenseRank = rankMatch ? rankMatch[1].trim() : '未知';

        fetch(SHEET_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            endingId: endingId,
            endingTitle: ending.title,
            defenseRank: defenseRank,
            durationSec: durationSec,
            userId: generateUID(),
            path: playerPath.join(' -> ')
          })
        }).catch(() => { }); // 靜默失敗，不影響遊戲
      }

      setTimeout(() => { setView('ending-view'); }, 1000);
    }

    // 分享結局功能（支援 Web Share API，不支援則複製到剪貼簿）
    function shareEnding() {
      const title = document.getElementById('ending-title').innerText;
      const shareData = {
        title: '午夜委託 - 沉浸式通訊解謎',
        text: `我在「午夜委託」中的結局是：${title}\n你能識破詐騙集團的陷阱嗎？`,
        url: location.href
      };
      if (navigator.share) {
        navigator.share(shareData).catch(() => { });
      } else {
        const text = `${shareData.text}\n${shareData.url}`;
        navigator.clipboard.writeText(text).then(() => {
          alert('已複製到剪貼簿！可貼上分享給朋友。');
        }).catch(() => {
          alert('請手動複製連結分享：' + location.href);
        });
      }
    }

    // 產生/取得匿名使用者 ID（存於 localStorage）
    function generateUID() {
      let uid = localStorage.getItem('game_uid');
      if (!uid) {
        uid = 'u_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('game_uid', uid);
      }
      return uid;
    }

    function updateLockscreenClock() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const mins = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('lockscreen-time').textContent = `${hours}:${mins}`;

      const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
      const month = now.getMonth() + 1;
      const day = now.getDate();
      document.getElementById('lockscreen-date').textContent = `${weekdays[now.getDay()]}\uff0c${month}月${day}日`;
    }

    // 初始化：顯示鎖屏 + 自動取得當前時間 + 3~5秒後直接來電
    (function init() {
      setView('menu-view');
      updateLockscreenClock();
      setInterval(updateLockscreenClock, 30000);

      lucide.createIcons();
      bindCallSlider();
      startGame();
    })();
  </script>
</body>
